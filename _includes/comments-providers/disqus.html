{% if site.comments.disqus.shortname %}
  {% capture comments_url %}{% include localized-absolute-url.html path=page.url %}{% endcapture %}
  <script>
    (function () {
      var button = document.getElementById("load-disqus");
      if (!button) return;

      button.addEventListener("click", function () {
        button.disabled = true;
        button.setAttribute("aria-busy", "true");
        button.textContent = button.dataset.loadingLabel;

        window.disqus_config = function () {
          this.page.url = "{{ comments_url | strip }}";
          this.page.identifier = "{{ page.id }}";
        };

        var script = document.createElement("script");
        script.src = "https://{{ site.comments.disqus.shortname }}.disqus.com/embed.js";
        script.setAttribute("data-timestamp", Date.now());
        script.async = true;
        script.onload = function () { button.remove(); };
        script.onerror = function () {
          button.disabled = false;
          button.removeAttribute("aria-busy");
          button.textContent = button.dataset.errorLabel;
        };
        (document.head || document.body).appendChild(script);
      });
    }());
  </script>
<noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
{% endif %}
