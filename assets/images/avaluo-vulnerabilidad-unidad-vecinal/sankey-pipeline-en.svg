<title id="chart-title">Cadastral processing flow</title>
<desc id="chart-desc">From 10,343,893 records, 942,616 duplicates were removed (9.11% of records), leaving 9,401,277 unique properties (90.89% of records). 9,130,127 touch at least one Neighborhood Unit (97.116% of unique properties) and 271,150 do not intersect any (2.884% of unique properties).</desc>
