<title id="chart-title">Flujo de procesamiento del catastro</title>
<desc id="chart-desc">De 10.343.893 registros se eliminaron 942.616 duplicados (9,11% de los registros); quedaron 9.401.277 predios únicos (90,89% de los registros). 9.130.127 tocan al menos una Unidad Vecinal (97,116% de los predios únicos) y 271.150 no la intersectan (2,884% de los predios únicos).</desc>
