name: Build & Deploy Jekyll to GitHub Pages

on:
  schedule:
    - cron: "0 9 * * *"  # 09:00 UTC diario (05:00 Chile invierno / 06:00 verano)
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JEKYLL_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install RSS fetch dependencies
        run: pip install feedparser

      - name: Refresh RSS sample for this build
        run: python scripts/fetch_news.py

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5   # <- importante

      - name: Build site (GitHub overrides)
        run: |
          bundle install
          bundle exec jekyll build --config _config.yml,_config_github.yml -d _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
