name: Deploy GitHub Pages redirector

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-redirector
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout redirector branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages-redirect

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload redirector artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy redirector
        id: deployment
        uses: actions/deploy-pages@v4
