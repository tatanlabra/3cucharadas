name: Deploy GitHub Pages redirect

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout redirector branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages-redirect
          path: _site_redirect

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Remove Git metadata from artifact
        run: rm -rf _site_redirect/.git

      - name: Upload redirector artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site_redirect

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:

      - name: Deploy redirector
        id: deployment
        uses: actions/deploy-pages@v5
