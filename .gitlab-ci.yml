# .gitlab-ci.yml — Jekyll 4.x + Minimal Mistakes (gem-based) → GitLab Pages
image: ruby:3.3

variables:
  JEKYLL_ENV: "production"
  BUNDLE_PATH: "vendor/bundle"
  BUNDLE_DEPLOYMENT: "true"
  GIT_DEPTH: "50"   # mitiga rate limits y acelera fetch

cache:
  paths:
    - vendor/bundle

stages:
  - build
  - deploy

build_site:
  stage: build
  script:
    - ruby -v
    - apt-get update -y
    - apt-get install -y --no-install-recommends ca-certificates curl python3 python3-pip python3-venv
    - curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
    - apt-get install -y --no-install-recommends nodejs
    - node --version
    - npm --version
    - npm ci
    - npm run check:catastro
    - npm run test:catastro
    - npm run build:catastro
    - python3 -m venv .venv
    - .venv/bin/pip install feedparser
    - .venv/bin/python scripts/fetch_news.py
    - gem install bundler -N
    - bundle install
    - bundle exec jekyll build -d public
    - ruby scripts/verify_site_artifact.rb public
    - bundle exec jekyll build --future -d .future-check
    - ruby scripts/verify_site_artifact.rb .future-check
    - bundle exec jekyll build --drafts --future -d .draft-math-check
    - VERIFY_MATH_DRAFTS=1 ruby scripts/verify_site_artifact.rb .draft-math-check
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'

pages:
  stage: deploy
  dependencies: [build_site]
  script:
    - echo "Publishing to GitLab Pages…"
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
