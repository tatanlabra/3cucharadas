# =========================
# 3 Cucharadas — Jekyll 4.x (build local) + Minimal Mistakes (gem)
# =========================

# Tema (gem-based). NO usar remote_theme en build local con gemas.
theme: "minimal-mistakes-jekyll"
minimal_mistakes_skin: "contrast"  # "air","aqua","contrast","dark","dirt","neon","mint","plum","sunrise"

# Site Settings
locale        : "es"
title         : "3 Cucharadas"
title_separator: "-"
subtitle      : "Directo al grano"
name          : &name "Cristián Labra Olivares"
description   : &description "Datos abiertos, estadísticas, MLOps, curiosidades, economía aplicada y políticas sociales, con código reproducible."

# Producción: dominio propio servido desde la raíz por GitLab Pages.
url           : "https://3cucharadas.cl"
baseurl       : ""
repository    : "tatanlabra/3cucharadas"

teaser        : "/assets/images/home/el-salvador-codera-hero-1600x524.webp"
# El masthead lo pinta a 32px (max-height: 2rem). La variante de 128px cubre hasta
# DPR 4 y pesa 3,5 KB en vez de 154 KB, en carga eager de cada página.
# El archivo de 1024px se conserva para usos que sí necesiten resolución completa.
logo          : "/assets/images/3cucharadas-logo-128.webp"
masthead_title: "3 Cucharadas"
words_per_minute: 200
enable_copy_code_button: true

timezone      : "America/Santiago"   # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
lang          : es

# Comentarios
comments:
  provider: "disqus"
  disqus:
    shortname: "https-tatanlabra-gitlab-io-3cucharadas"

# Búsqueda (Lunr por defecto en Minimal Mistakes)
search: true
search_full_content: true
# (sin search_provider => Lunr)

# Feed Atom
atom_feed:
  path: /feed.xml

# Feeds por categoría (jekyll-feed): genera /feed/<categoria>.xml para los temas principales,
# de modo que cada línea temática que publico tenga su propio RSS suscribible.
feed:
  categories:
    - datos
    - politica-publica
    - mlops
    - ia

# SEO
google_site_verification: "MAUpzyqJl1OD67CWrwjWmHhK6oj_N7OvFtcAB9GUWKo"
og_image: "/assets/images/3cucharadas-logo.png"

# Social
twitter:
  username: &twitter "tatanlabra"
facebook:
  username: &facebook "cristianlabra"
social:
  type: "Person"
  name: *name
  links:
    - "https://www.linkedin.com/in/cristianlabra/"
    - "https://mastodon.social/@asiole"
    - "https://bsky.app/profile/labra.bsky.social"
    - "https://x.com/tatanlabra"
    - "https://www.facebook.com/cristianlabra"
    - "https://github.com/tatanlabra"
    - "https://gitlab.com/tatanlabra"
    - "https://instagram.com/tatanlabra"
    - "https://repositorio.uchile.cl/browse?authority=88cfb186-afaf-4086-ac6f-36fbc7adf42a&type=author"
    - "https://scholar.google.com/citations?user=ByUN51gAAAAJ"
    - "https://orcid.org/0009-0008-5047-8762"

# Analytics (GA4)
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-E5NT0GJ9VT"
    anonymize_ip: true

cv_path: /assets/cv/cv_esp_clabraol_2026.pdf

# Autor
author:
  name   : *name
  avatar : "/assets/images/clabra2026.webp"
  bio    : *description
  location: "Santiago, Chile"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"      # usar 'fa-linkedin' (FA5); 'fa-linkedin-in' también sirve
      url: "https://www.linkedin.com/in/cristianlabra/"
    # - label: "GitLab"
    #   icon: "fab fa-fw fa-gitlab"
    #   url: "https://gitlab.com/tatanlabra"
    # - label: "GitHub"
    #   icon: "fab fa-fw fa-github"
    #   url: "https://github.com/tatanlabra"      
    # - label: "X (Twitter)"
    #   icon: "fab fa-fw fa-twitter"       # en FA5 NO existe 'fa-x-twitter'
    #   url: "https://x.com/tatanlabra"
    - label: "Mastodon"
      icon: "fab fa-fw fa-mastodon"
      url: "https://mastodon.social/@asiole"
    - label: "Bluesky"
      icon: "fas fa-fw fa-cloud"              # fallback compatible con el set de iconos del tema
      url: "https://bsky.app/profile/labra.bsky.social"
    - label: "CV"
      icon: "fas fa-fw fa-file-pdf"
      url: "/assets/cv/cv_esp_clabraol_2026.pdf"

# Footer
footer:
  links:
    - label: "Mastodon"
      icon: "fab fa-fw fa-mastodon"
      url: "https://mastodon.social/@asiole"
    - label: "Bluesky"
      icon: "fas fa-fw fa-cloud"
      url: "https://bsky.app/profile/labra.bsky.social"
    - label: "X"
      icon: "fab fa-fw fa-x-twitter"
      url: "https://x.com/tatanlabra"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/tatanlabra"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/tatanlabra"

# Lectura/Exclusiones
include:
  - .htaccess
  - _pages
  # Cabeceras de seguridad de GitLab Pages. Jekyll ignora los archivos con guion bajo
  # inicial, así que sin esta línea el artefacto se publica sin ninguna política.
  - _headers
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - public          # dir de salida de GitLab Pages; nunca tratarlo como fuente
  - .redirect_build # salida temporal del redirector GitHub Pages
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/img
  - assets/images/ai-quota-hud/bar_gemini.png
  - assets/images/ai-quota-hud/popup.png
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - tsconfig.catastro.json
  - vite.catastro.config.ts
  - vitest.catastro.config.ts
  - assets/src
  # PMTiles de revisión local: se sirven en preview, pero su origen público es R2.
  # Excluirlos explícitamente evita que una copia ignorada por Git infle _site/public.
  - assets/data/catastro_sii/local
  - tests
  - reports
  - scripts/catastro_sii
  - deploy
  - difusion       # herramienta local; nunca copiar codigo/tests al sitio publico
  - docs
  - Rakefile
  - README
  - tools
  - tmp
keep_files:
  - .git
  - .svn

encoding    : "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversión/Markdown
markdown    : kramdown
highlighter : rouge
lsi         : false
excerpt_separator: "\n\n"
incremental : false

kramdown:
  input: GFM
  math_engine: katex
  hard_wrap: false
  auto_ids: true
  transliterated_header_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  syntax_highlighter: rouge

# Colecciones (ejemplos desactivados)
#collections:
  # docs:
  #   output: false
  #   permalink: /:collection/:path/

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      toc: true
      toc_sticky: true
      comments: true     # actívalo por post cuando configures el provider
      share: true
      related: true
      math: false
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed
  quiet_deps: true
  sourcemap: never

# Salida/URLs
permalink    : /:categories/:title/
paginate     : 8
paginate_path: /page:num/

# Plugins
plugins:
  # Retiradas tras auditoria (2026-07-19): jekyll-gist (0 usos de {% gist %}, hacia
  # require de octokit 4.x en cada build), jemoji (0 spans emoji en 544 paginas) y
  # jekyll-seo-tag (los meta tags salen de _includes/seo.html). Siguen en el bundle
  # porque minimal-mistakes-jekyll las declara como dependencias, pero ya no se cargan.
  - jekyll-paginate
  # jekyll-sitemap desactivado: usamos un sitemap.xml propio multilingüe (incluye /en/),
  # ver _pages/sitemap.xml. jekyll-sitemap no emite las URLs de polyglot.
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-polyglot

# Multi-idioma (jekyll-polyglot). ES por defecto en la raíz del baseurl; EN bajo /en/.
# Las cadenas de UI en inglés ya vienen en _data/ui-text.yml.
languages: ["es", "en"]
default_lang: "es"
exclude_from_localization: ["assets", "javascript", "images", "favicon", "feed.xml", "feed-julia.xml", "feed-dev-en.xml", "robots.txt", "sitemap.xml", "cv", "public", "catastro_sii_brecha"]
parallel_localization: true

# Archivos (categorías/tags por páginas dedicadas)
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Compresión HTML (opcional; inofensivo si no usas layout específico)
compress_html:
  clippings: all
  ignore:
    envs: development
